<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Milionerzy - Edycja Fizyczna</title>
    <style>
        :root {
            --bg-color: #020230;
            --accent-color: #2b32b2;
            --gold: #d4af37;
            --correct: #28a745;
            --wrong: #dc3545;
        }


        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }


        #game-container {
            width: 100%;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 20px;
            padding: 20px;
        }


        /* Sekcja pytań */
        .quiz-area {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 20px;
        }


        .lifelines {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }


        .lifeline {
            background: radial-gradient(circle, #2b32b2, #111);
            border: 2px solid var(--gold);
            border-radius: 50%;
            width: 120px;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 30px;
        }


        .lifeline.used {
            opacity: 0.3;
            cursor: not-allowed;
            text-decoration: line-through;
        }


        .question-box {
            width: 1600px;
            height: 100px;
            line-height: 100px;
            border: 2px solid var(--gold);
            padding: 20px;
            text-align: center;
            border-radius: 50px;
            background: rgba(0,0,0,0.5);
            font-size: 2.5rem;
            position: relative;
        }


        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }


        .answer {
            font-size: 1.6rem;
            height: 75px;
            line-height: 75px;
            text-align: center;
            border: 2px solid var(--gold);
            padding: 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0,0,0,0.5);
        }


        .answer:hover { background: var(--accent-color); }
        .correct { background-color: var(--correct) !important; }
        .wrong { background-color: var(--wrong) !important; }


        /* Drzewko pieniędzy */
        .money-tree {
            border-left: 2px solid var(--gold);
            padding-left: 20px;
            display: flex;
            flex-direction: column-reverse;
            justify-content: space-around;
        }


        .level { color: var(--gold); padding: 2px; }
        .level.active { background-color: orange; color: black; font-weight: bold; border-radius: 5px; }
        .guaranteed { color: white; }


        #message-box {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--accent-color);
            padding: 40px;
            border: 4px solid var(--gold);
            text-align: center;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body>


<div id="game-container">
    <div class="quiz-area">

        <div id="question" class="question-box">Ładowanie pytania...</div>

        <div class="answers-grid">
            <div class="answer" onclick="checkAnswer(0)" id="btn0">A: <span></span></div>
            <div class="answer" onclick="checkAnswer(1)" id="btn1">B: <span></span></div>
            <div class="answer" onclick="checkAnswer(2)" id="btn2">C: <span></span></div>
            <div class="answer" onclick="checkAnswer(3)" id="btn3">D: <span></span></div>
        </div>
    </div>


    <div class="money-tree" id="tree">
        </div>
    <div class="lifelines">
        <div id="fifty-fifty" class="lifeline" onclick="useFiftyFifty()">50:50</div>
        <div id="phone" class="lifeline" onclick="usePhone()">📞</div>
        <div id="audience" class="lifeline" onclick="useAudience()">👥</div>
    </div>
</div>


<div id="message-box">
    <h2 id="msg-text"></h2>
    <button onclick="location.reload()" style="padding:10px 20px; cursor:pointer">Zagraj jeszcze raz</button>
</div>


<script>
    const questions = [
        { q: "Jednostką siły w układzie SI jest:", a: ["Wat", "Dżul", "Niuton", "Paskal"], c: 2 },
        { q: "W jakim stanie skupienia cząsteczki poruszają się najszybciej?", a: ["Stały", "Ciekły", "Gazowy", "Plazma"], c: 2 },
        { q: "Prędkość światła w próżni wynosi około:", a: ["300 000 km/s", "1000 km/h", "340 m/s", "150 000 m/s"], c: 0 },
        { q: "Zjawisko przejścia ze stanu gazowego w ciecz to:", a: ["Parowanie", "Skraplanie", "Sublimacja", "Topnienie"], c: 1 },
        { q: "Wzór na gęstość to:", a: ["d = m * V", "d = m / V", "d = V / m", "d = F * s"], c: 1 },
        { q: "Dźwięk nie rozchodzi się w:", a: ["Wodzie", "Stali", "Próżni", "Powietrzu"], c: 2 },
        { q: "Które z wymienionych to przewodnik prądu?", a: ["Guma", "Miedź", "Plastik", "Szkło"], c: 1 },
        { q: "Zasada Archimedesa dotyczy siły:", a: ["Tarcia", "Ciężkości", "Wyporu", "Elektrostatycznej"], c: 2 },
        { q: "Energia potencjalna zależy od:", a: ["Prędkości", "Wysokości", "Temperatury", "Ciśnienia"], c: 1 },
        { q: "Jednostką oporu elektrycznego jest:", a: ["Wolt", "Amper", "Om", "Kulomb"], c: 2 },
        { q: "Lustro wklęsłe skupia promienie w:", a: ["Ognisku", "Soczewce", "Cieniu", "Widmie"], c: 0 },
        { q: "Pierwsza zasada dynamiki Newtona nazywana jest zasadą:", a: ["Akcji", "Bezwładności", "Oddziaływania", "Grawitacji"], c: 1 }
    ];


    const levels = ["100 zł", "200 zł", "500 zł", "1 000 zł (G)", "2 000 zł", "5 000 zł", "10 000 zł", "20 000 zł", "40 000 zł (G)", "75 000 zł", "500 000 zł", "1 000 000 zł"];
    
    let currentLevel = 0;
    let canClick = true;


    function initTree() {
        const tree = document.getElementById('tree');
        levels.forEach((val, i) => {
            const div = document.createElement('div');
            div.className = 'level' + (val.includes('(G)') ? ' guaranteed' : '');
            div.id = 'lvl-' + i;
            div.innerText = `${i + 1} - ${val}`;
            tree.appendChild(div);
        });
        updateQuestion();
    }


    function updateQuestion() {
        canClick = true;
        document.querySelectorAll('.answer').forEach(el => el.className = 'answer');
        document.querySelectorAll('.level').forEach(el => el.classList.remove('active'));
        document.getElementById('lvl-' + currentLevel).classList.add('active');


        const qData = questions[currentLevel];
        document.getElementById('question').innerText = qData.q;
        for(let i=0; i<4; i++) {
            const btn = document.getElementById('btn' + i);
            btn.querySelector('span').innerText = qData.a[i];
            btn.style.visibility = 'visible';
        }
    }


    function checkAnswer(idx) {
        if(!canClick) return;
        canClick = false;


        const correctIdx = questions[currentLevel].c;
        const btn = document.getElementById('btn' + idx);


        if(idx === correctIdx) {
            btn.classList.add('correct');
            setTimeout(() => {
                currentLevel++;
                if(currentLevel === levels.length) {
                    endGame("GRATULACJE! Zostałeś Milionerem Fizyki!");
                } else {
                    updateQuestion();
                }
            }, 1500);
        } else {
            btn.classList.add('wrong');
            document.getElementById('btn' + correctIdx).classList.add('correct');
            setTimeout(() => endGame("Koniec gry! Twoja wiedza z fizyki wyczerpała się."), 2000);
        }
    }


    function useFiftyFifty() {
        if(document.getElementById('fifty-fifty').classList.contains('used')) return;
        const correct = questions[currentLevel].c;
        let removed = 0;
        while(removed < 2) {
            let rand = Math.floor(Math.random() * 4);
            if(rand !== correct && document.getElementById('btn' + rand).style.visibility !== 'hidden') {
                document.getElementById('btn' + rand).style.visibility = 'hidden';
                removed++;
            }
        }
        document.getElementById('fifty-fifty').classList.add('used');
    }


    function usePhone() {
        if(document.getElementById('phone').classList.contains('used')) return;
        const correct = questions[currentLevel].c;
        const letters = ['A', 'B', 'C', 'D'];
        alert("Przyjaciel mówi: Wydaje mi się, że poprawna odpowiedź to " + letters[correct]);
        document.getElementById('phone').classList.add('used');
    }


    function useAudience() {
        if(document.getElementById('audience').classList.contains('used')) return;
        const correct = questions[currentLevel].c;
        alert(`Głosowanie publiczności:\nA: ${correct===0?'60%':'10%'}\nB: ${correct===1?'60%':'10%'}\nC: ${correct===2?'60%':'10%'}\nD: ${correct===3?'60%':'20%'}`);
        document.getElementById('audience').classList.add('used');
    }


    function endGame(msg) {
        document.getElementById('msg-text').innerText = msg;
        document.getElementById('message-box').style.display = 'block';
    }


    initTree();
</script>


</body>
</html>
