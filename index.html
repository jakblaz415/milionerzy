<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <title>Milionerzy - Edycja Fizyczna</title>
    <style>
      :root {
        --bg-color: #020230;
        --accent-color: #2b32b2;
        --gold: #d4af37;
        --correct: #28a745;
        --wrong: #dc3545;
      }
      body {
        background-color: var(--bg-color);
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
      }

      #game-container {
        width: 100%;
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 20px;
        padding: 20px;
      }

      .quiz-area {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        gap: 20px;
      }

      .lifelines {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }

      .lifeline {
        background: radial-gradient(circle, #2b32b2, #111);
        border: 2px solid var(--gold);
        border-radius: 50%;
        width: 120px;
        height: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        font-weight: bold;
        font-size: 30px;
      }

      .lifeline.used {
        opacity: 0.3;
        cursor: not-allowed;
        text-decoration: line-through;
      }

      .question-box {
        width: 1600px;
        min-height: 175px;
        border: 2px solid var(--gold);
        padding: 20px;
        text-align: center;
        border-radius: 50px;
        background: rgba(0, 0, 0, 0.5);
        font-size: 3.5rem;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1.2;
        word-wrap: break-word;
      }

      .answers-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }

      .answer {
        font-size: 3rem;
        min-height: 125px;
        text-align: center;
        border: 2px solid var(--gold);
        padding: 15px;
        border-radius: 30px;
        cursor: pointer;
        transition: 0.3s;
        background: rgba(0, 0, 0, 0.5);

        display: flex;
        align-items: center;
        justify-content: center;

        line-height: 1.2;
        word-wrap: break-word;
      }

      .answer:hover {
        background: var(--accent-color);
      }
      .answer span {
        margin-left: 10px;
      }
      .correct {
        background-color: var(--correct) !important;
      }
      .wrong {
        background-color: var(--wrong) !important;
      }

      .money-tree {
        border-left: 2px solid var(--gold);
        padding-left: 20px;
        display: flex;
        flex-direction: column-reverse;
        justify-content: space-around;
        font-size: 1.6rem;
      }

      .level {
        color: var(--gold);
        padding: 2px;
      }
      .level.active {
        background-color: orange;
        color: black;
        font-weight: bold;
        border-radius: 5px;
      }
      .guaranteed {
        color: white;
      }

      #message-box {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--accent-color);
        padding: 40px;
        border: 4px solid var(--gold);
        text-align: center;
        display: none;
        z-index: 10;
        white-space: pre-line;
      }
      #msg-btn {
        cursor: pointer;
        width: 65px;
        height: 50px;
        text-align: center;
        font-size: 1.5rem;
        border: 3px solid var(--gold);
      }
    </style>
  </head>

        const answers = q.a.map((text, index) => ({
          text: text,
          correct: index === q.c,
        }));

        // mieszanie odpowiedzi
        for (let i = answers.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [answers[i], answers[j]] = [answers[j], answers[i]];
        }

        // zapis nowych odpowiedzi
        q.a = answers.map((a) => a.text);

        // nowy indeks poprawnej
        q.c = answers.findIndex((a) => a.correct);

        return q;

          a: ["25 W", "40 W", "50 W", "100 W"],
          c: 2,
        },
        {
          q: "Ile wymiarów ma geometryczny punkt?",
          a: ["zero", "jeden", "dwa", "trzy"],
          c: 0,
        },
      ];

      let questions = [
        ...shuffle(easy).slice(0, 4),
        ...shuffle(medium).slice(0, 5),
        ...shuffle(hard).slice(0, 3),
      ];

      // LOSOWANIE ODPOWIEDZI W KAŻDYM PYTANIU
      questions = questions.map((q) => shuffleQuestion(q));

      const levels = [
        "100 zł",
        "200 zł",
        "500 zł",
        "1 000 zł (G)",
        "2 000 zł",
        "5 000 zł",
        "10 000 zł",
        "20 000 zł",
        "40 000 zł (G)",
        "75 000 zł",
        "500 000 zł",
        "1 000 000 zł",
      ];

      let currentLevel = 0;
      let canClick = true;
      let gameOver = false;

      function initTree() {
        const tree = document.getElementById("tree");

        levels.forEach((val, i) => {
          const div = document.createElement("div");
          div.className = "level" + (val.includes("(G)") ? " guaranteed" : "");
          div.id = "lvl-" + i;
          div.innerText = `${i + 1} - ${val}`;
          tree.appendChild(div);
        });

        updateQuestion();
      }

      function updateQuestion() {
        canClick = true;

        document
          .querySelectorAll(".answer")
          .forEach((el) => (el.className = "answer"));

        document
          .querySelectorAll(".level")
          .forEach((el) => el.classList.remove("active"));

        document.getElementById("lvl-" + currentLevel).classList.add("active");

        const qData = questions[currentLevel];

        document.getElementById("question").innerText = qData.q;

        for (let i = 0; i < 4; i++) {
          const btn = document.getElementById("btn" + i);
          btn.querySelector("span").innerText = qData.a[i];
          btn.style.visibility = "visible";
        }
      }

      function checkAnswer(idx) {
        if (!canClick) return;

        canClick = false;

        const correctIdx = questions[currentLevel].c;

        const btn = document.getElementById("btn" + idx);

        if (idx === correctIdx) {
          btn.classList.add("correct");

          setTimeout(() => {
            currentLevel++;

            if (currentLevel === levels.length) {
              endGame("GRATULACJE! Zostałeś Milionerem Fizyki!");
            } else {
              updateQuestion();
            }
          }, 1500);
        } else {
          btn.classList.add("wrong");

          document.getElementById("btn" + correctIdx).classList.add("correct");

          setTimeout(
            () => endGame("Koniec gry! Twoja wiedza z fizyki wyczerpała się."),
            2000,
          );
        }
      }

      function useFiftyFifty() {
        if (document.getElementById("fifty-fifty").classList.contains("used"))
          return;

        const correct = questions[currentLevel].c;

        let removed = 0;

        while (removed < 2) {
          let rand = Math.floor(Math.random() * 4);

          if (
            rand !== correct &&
            document.getElementById("btn" + rand).style.visibility !== "hidden"
          ) {
            document.getElementById("btn" + rand).style.visibility = "hidden";
            removed++;
          }
        }

        document.getElementById("fifty-fifty").classList.add("used");
      }

      function usePhone() {
        if (document.getElementById("phone").classList.contains("used")) return;

        const correct = questions[currentLevel].c;
        const letters = ["A", "B", "C", "D"];

        showMessage(
          "📞 Przyjaciel mówi: Wydaje mi się, że poprawna odpowiedź to " +
            letters[correct],
        );

        document.getElementById("phone").classList.add("used");
      }

      function useAudience() {
        if (document.getElementById("audience").classList.contains("used"))
          return;

        const correct = questions[currentLevel].c;

        const msg = `👥 Głosowanie publiczności:
        A: ${correct === 0 ? "60%" : "10%"}
        B: ${correct === 1 ? "60%" : "10%"}
        C: ${correct === 2 ? "60%" : "10%"}
        D: ${correct === 3 ? "60%" : "20%"}`;

        showMessage(msg);

        document.getElementById("audience").classList.add("used");
      }

      function endGame(msg) {
        gameOver = true;
        document.getElementById("msg-text").innerText = msg;
        document.getElementById("message-box").style.display = "block";
      }
      function showMessage(msg) {
        document.getElementById("msg-text").innerText = msg;
        document.getElementById("message-box").style.display = "block";
      }
      function closeMessage() {
        document.getElementById("message-box").style.display = "none";
        if (gameOver) {
          location.reload();
        }
      }

      initTree();
    </script>
